name: install nodejs and pnpm
description: 'Install nodejs and pnpm environment'

branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  pnpm-version:
    required: false
    description: pnpm major version
    default: '11'
  node-version:
    required: false
    description: nodejs version
    default: 'lts/jod'
  token:
    description: github token
    default: ${{ github.token }}
  minimum-release-age:
    required: false
    description: minimum package release age in minutes
    default: '1440'

runs:
  using: 'composite'
  steps:
    - name: Install Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        
    - name: Cache pnpm store
      uses: actions/cache@v5
      with:
        path: ~/.pnpm-store
        key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-

    - name: Install pnpm
      uses: pnpm/action-setup@v6
      with:
        version: ${{ inputs.pnpm-version }}
        run_install: false

    - name: Configure GitHub Packages auth
      run: pnpm config set "//npm.pkg.github.com/:_authToken" "${{ inputs.token }}"
      shell: sh

    - name: Configure minimum release age
      run: pnpm config set minimumReleaseAge "${{ inputs.minimum-release-age }}"
      shell: sh

    - name: Install pnpm dependencies
      run: |
        pnpm install -r \
          --frozen-lockfile \
          --strict-peer-dependencies \
          --network-concurrency=3
      shell: sh
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
