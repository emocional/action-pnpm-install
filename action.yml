name: install nodejs and pnpm
description: 'Install nodejs and pnpm environment'

branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  pnpm-version:
    required: false
    description: pnpm major version
    default: '11'
  node-version:
    required: false
    description: nodejs version
    default: 'lts/jod'
  token:
    description: github token
    default: ${{ github.token }}
  minimum-release-age:
    required: false
    description: minimum package release age in minutes
    default: '1440'
  cache-dependency-path:
    required: false
    description: lockfile path(s) for pnpm store cache key (newline-separated)
    default: pnpm-lock.yaml
  working-directory:
    required: false
    description: directory to run pnpm install from (composite actions always start at repo root)
    default: .
  recursive:
    required: false
    description: pass -r to pnpm install (monorepo / workspace root)
    default: 'true'
  strict-peer-dependencies:
    required: false
    description: pass --strict-peer-dependencies to pnpm install
    default: 'true'
  skip-install:
    required: false
    description: only set up node, pnpm, auth and cache; do not run pnpm install
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Install Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
      env:
        GITHUB_TOKEN: ${{ inputs.token }}

    - name: Install pnpm
      uses: pnpm/action-setup@v6
      with:
        version: ${{ inputs.pnpm-version }}
        run_install: false
        cache: true
        cache_dependency_path: ${{ inputs.cache-dependency-path }}

    - name: Configure GitHub Packages auth
      run: pnpm config set "//npm.pkg.github.com/:_authToken" "${{ inputs.token }}"
      shell: sh

    - name: Configure minimum release age
      run: pnpm config set minimumReleaseAge "${{ inputs.minimum-release-age }}"
      shell: sh

    - name: Install pnpm dependencies
      if: inputs.skip-install != 'true'
      run: |
        install_args="--frozen-lockfile --network-concurrency=3"
        if [ "${{ inputs.strict-peer-dependencies }}" = "true" ]; then
          install_args="$install_args --strict-peer-dependencies"
        fi
        if [ "${{ inputs.recursive }}" = "true" ]; then
          install_args="$install_args -r"
        fi
        cd "${{ inputs.working-directory }}"
        pnpm install $install_args
      shell: sh
